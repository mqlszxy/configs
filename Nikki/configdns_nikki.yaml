# 规则集
## type：可选http/file/inline  behavior：可选domain/ipcidr/classical format：可选yaml/text/mrs
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  domain_text: &domain_text {type: http, interval: 86400, behavior: domain, format: text}
  ip_text: &ip_text {type: http, interval: 86400, behavior: ipcidr, format: text}
  classical_text: &classical_text {type: http, interval: 86400, behavior: classical, format: text}
rule-providers: 
  # 自建规则集
  realip_domain_direct: { <<: *domain_text, url: "https://raw.githubusercontent.com/mqlszxy/configs/refs/heads/main/Nikki/realip_domain_direct.txt" }           # 自定义fakeip过滤域名规则集,直连DNS
  realip_domain_proxy: { <<: *domain_text, url: "https://raw.githubusercontent.com/mqlszxy/configs/refs/heads/main/Nikki/realip_domain_proxy.txt" }             # 自定义fakeip过滤域名规则集,代理DNS
