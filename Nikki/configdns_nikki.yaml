# DNS防泄露版本
# 必读！！！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅

# 故转节点
Fallback: &Fallback {type: select, proxies: [🔁 狮城故转, 🔁 台湾故转, 🔁 日本故转, 🔁 香港故转, 🔁 美国故转, 🔁 英国故转, 🔁 韩国故转, 🔁 澳洲故转, 🌐 自选节点1, 🌐 自选节点2, 🌐 自选节点3, 🌐 自选节点4, 🔗 直连, 🚫 拒绝]}
# 自选节点
customize: &customize {type: select, include-all: true}

proxy-providers:
  WD:
    url: "机场订阅URL"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🔗 直连

# 节点信息
proxies:
  - {name: 🔗 直连, type: direct}
  - {name: 🚫 拒绝, type: reject}

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
#sniffer:
#  enable: true
#  sniff:
#    HTTP:
#      ports: [80, 8080-8880]
#      override-destination: true
#    TLS:
#      ports: [443, 8443]
#    QUIC:
#      ports: [443, 8443]
#  skip-domain:
#    - "Mijia Cloud"
#    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  resolve-concurrent: true                                      # DNS并发解析开关
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query
  fake-ip-filter:
    - 'rule-set:blacklist_domain'                               # 自建域名黑名单规则集
    - 'rule-set:blacklist_classical'                            # 自建域名黑名单规则集    
    - 'rule-set:realip_domain_direct'                           # 自建不使用fakeip的代理的规则集
    - 'rule-set:realip_domain_proxy'                            # 自建不使用fakeip的直连的规则集
  nameserver-policy:
    'rule-set:blacklist_domain':                                # 自建域名黑名单规则集,DNS不解析
      - 0.0.0.0
    'rule-set:blacklist_classical':                             # 自建域名黑名单规则集,DNS不解析
      - 0.0.0.0
    'rule-set:realip_domain_direct':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:realip_domain_proxy':
      - https://8.8.8.8/dns-query
      - tls://1.1.1.1:853
      - https://1.0.0.1/dns-query

# 出站策略，根据自己情况调整每个策略里分组排序，增删都可以，比如把美国自动放到第一个，比如删除香港故转，注意别漏掉表情逗号等。
# 如果相应分组没有筛选到对应的国家，请根据自己节点名字调整筛选关键字。
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
proxy-groups:
  # 策略
  - {name: 🔍 Google, <<: *Fallback}
  - {name: 📲 Telegram, <<: *Fallback}
  - {name: 🤖 AI, <<: *Fallback}
  - {name: 💻 Github, <<: *Fallback}
  - {name: 📹 YouTube, <<: *Fallback}
  - {name: 🍎 Apple, <<: *Fallback}
  - {name: 🎮 游戏, <<: *Fallback}
  - {name: 🪟 Microsoft, <<: *Fallback}
  - {name: 🎥 TikTok, <<: *Fallback}
  - {name: 📺 Netflix, <<: *Fallback}
  - {name: 🏰 Disney, <<: *Fallback}
  - {name: 🎞️ HBO Max, <<: *Fallback}
  - {name: 📽️ Apple TV, <<: *Fallback}
  - {name: 🎧 Spotify, <<: *Fallback}
  - {name: 🐦 Twitter / X, <<: *Fallback}
  - {name: 👽 Reddit, <<: *Fallback}
  - {name: 💬 WhatsApp, <<: *Fallback}
  - {name: 💶 PayPal, <<: *Fallback}
  - {name: 🛡️ 流量净化, <<: *Fallback}
  - {name: 📡 消息推送, <<: *Fallback}
  - {name: 🔗 直连服务, <<: *Fallback}
  - {name: 🚀 外网兜底, <<: *Fallback}
  - {name: 🧯 全局兜底, <<: *Fallback}
  - {name: 🌐 自选节点1, <<: *customize}
  - {name: 🌐 自选节点2, <<: *customize}
  - {name: 🌐 自选节点3, <<: *customize}
  - {name: 🌐 自选节点4, <<: *customize}
  # 故转
  - {name: 🔁 狮城故转, type: fallback, include-all: true, filter: "(?i)(🇸🇬|新加坡|坡|狮城|SG|Singapore|SIN)", exclude-filter: "(?i)(台|台湾|日|日本|韩|韩国|深|深圳|美|美国|港|香港|UK|英|澳)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 台湾故转, type: fallback, include-all: true, filter: "(?i)(🇹🇼|台|台湾|TW|Taiwan|Taipei)", exclude-filter: "(?i)(港|香港|美|美国|韩|韩国|新|新加坡|日|日本|UK|英|澳|states|america)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 日本故转, type: fallback, include-all: true, filter: "(?i)(🇯🇵|日|日本|JP|Japan|Tokyo|TYO|Osaka)", exclude-filter: "(?i)(港|香港|台|台湾|韩|韩国|新|新加坡|美|美国|UK|英|澳)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 香港故转, type: fallback, include-all: true, filter: "(?i)(🇭🇰|港|香港|HK|Hong Kong|HKG)", exclude-filter: "(?i)(台|台湾|日|日本|韩|韩国|新|新加坡|深|深圳|美|美国|UK|英|澳)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 美国故转, type: fallback, include-all: true, filter: "(?i)(🇺🇸|美|美国|US|United States|America|NYC|LAX|Los Angeles|Chicago)", exclude-filter: "(?i)(港|香港|台|台湾|韩|韩国|新|新加坡|日|日本|UK|英|澳)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 韩国故转, type: fallback, include-all: true, filter: "(?i)(🇰🇷|韩|韩国|KR|Korea|Seoul)", exclude-filter: "(?i)(港|香港|台|台湾|新|新加坡|日|日本|美|美国|UK|英|澳)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 英国故转, type: fallback, include-all: true, filter: "(?i)(🇬🇧|英|英国|UK|United Kingdom|Britain|England|London|LHR|MAN)", exclude-filter: "(?i)(港|香港|台|台湾|韩|韩国|新|新加坡|日|日本|美|美国|澳|澳大利亚)", interval: 300, timeout: 5000, lazy: true}
  - {name: 🔁 澳洲故转, type: fallback, include-all: true, filter: "(?i)(🇦🇺|澳|澳大利亚|Australia|Sydney|SYD|Melbourne)", exclude-filter: "(?i)(港|香港|台|台湾|韩|韩国|新|新加坡|日|日本|美|美国|UK|英)", interval: 300, timeout: 5000, lazy: true}

# 规则匹配
rules:
  # 🛡️ 流量净化 (按危险优先级排序)
  - RULE-SET,google_ads_domain,🛡️ 流量净化                 # 谷歌广告
  - RULE-SET,disney_ads_domain,🛡️ 流量净化                 # disney广告
  - RULE-SET,apple_ads_domain,🛡️ 流量净化                  # apple广告
  - RULE-SET,ad_domain,🛡️ 流量净化                         # 广告
  - AND,((DOMAIN-SUFFIX,core.api.mijia.tech),(DST-PORT,80)),🛡️ 流量净化   # core.api.mijia.tech:80无法连接
  - AND,((DOMAIN-SUFFIX,risk.dun.mi.com),(DST-PORT,443)),🛡️ 流量净化      # risk.dun.mi.com:443无法连接
  # 自建规则集（流量处理方式借用已配置策略组）
  - RULE-SET,blacklist_domain,🛡️ 流量净化                  # 自建域名黑名单规则集
  - RULE-SET,blacklist_classical,🛡️ 流量净化               # 自建域名黑名单规则集
  - RULE-SET,blacklist_ip,🛡️ 流量净化,no-resolve           # 自建ip黑名单规则集
  # 📡 消息推送
  - RULE-SET,google_fcm_domain,📡 消息推送                 # GoogleFCM
  # 白名单
  - RULE-SET,whitelist_domain_direct,🔗 直连服务           # 自建直连域名白名单规则集
  - RULE-SET,whitelist_ip_direct,🔗 直连服务,no-resolve    # 自建直连ip白名单规则集
  - RULE-SET,whitelist_domain_proxy,🚀 外网兜底            # 自建代理域名白名单规则集
  - RULE-SET,whitelist_ip_proxy,🚀 外网兜底,no-resolve     # 自建代理ip白名单规则集
  # 内网直连
  - RULE-SET,private_ip,🔗 直连服务,no-resolve
  - RULE-SET,private_domain,🔗 直连服务
  # 💶 PayPal
  - RULE-SET,paypal_domain,💶 PayPal
  # 📲 Telegram
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,telegram_domain,📲 Telegram
  # 📹 YouTube
  - RULE-SET,youtube_domain,📹 YouTube
  # 🍎 Apple
  - RULE-SET,apple_domain,🍎 Apple
  # 🤖 AI
  - RULE-SET,ai_domain,🤖 AI
  # 💻 Github
  - RULE-SET,github_domain,💻 Github
  # 🎥 TikTok
  - RULE-SET,tiktok_domain,🎥 TikTok
  # 📺 Netflix
  - RULE-SET,netflix_ip,📺 Netflix,no-resolve
  - RULE-SET,netflix_domain,📺 Netflix
  # 🏰 Disney
  - RULE-SET,disney_domain,🏰 Disney
  # 🎞️ HBO Max
  - RULE-SET,hbo_domain,🎞️ HBO Max
  # 📽️ Apple TV
  - RULE-SET,apple_tvplus_domain,📽️ Apple TV
  # 🎧 Spotify
  - RULE-SET,spotify_domain,🎧 Spotify
  # 🎮 游戏
  - RULE-SET,steam_unlock_domain,🎮 游戏
  - RULE-SET,steam_domain,🎮 游戏
  - RULE-SET,nintendo_domain,🎮 游戏
  # 🐦 Twitter / X
